server {
    listen 8081;  # Listen on port 80
    server_name localhost;  # Change this to your domain name if needed

    root /usr/share/nginx/html;  # Root directory for your static files
    index index.html;  # Default file to serve

    location / {
        try_files $uri $uri/ /index.html;  # Serve index.html for all requests not matching a file
    }

    # Optional: Add caching for static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;  # Cache for 1 year
        add_header Cache-Control "public";
    }

    # Optional: Handle 404 errors
    error_page 404 /index.html;  # Redirect 404 errors to index.html
}
